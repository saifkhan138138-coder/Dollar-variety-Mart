<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dollar Variety Mart | Sillanwali</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

header{
background:linear-gradient(90deg,#d50000,#000);
color:#fff;
padding:20px;
text-align:center;
}

header h1{
font-size:34px;
}

header p{
margin-top:8px;
font-size:18px;
}

.hero{
background:#fff;
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:32px;
color:#d50000;
margin-bottom:15px;
}

.hero p{
font-size:18px;
line-height:1.7;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.btn:hover{
background:#128C7E;
}

.products{
padding:50px 20px;
background:#f8f8f8;
}

.products h2{
text-align:center;
font-size:30px;
color:#d50000;
margin-bottom:30px;
}

.grid{
display:grid
  
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}.card{
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.card h3{
color:#d50000;
margin:10px 0;
}

.price{
font-size:22px;
font-weight:bold;
color:#008000;
margin:10px 0;
}

.whatsapp-btn{
display:inline-block;
padding:10px 18px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.whatsapp-btn:hover{
background:#128C7E;
}
