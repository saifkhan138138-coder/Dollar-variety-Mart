<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Items - Dollar Variety Mart</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#d50000;
color:white;
text-align:center;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
padding-bottom:15px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
}

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin-top:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🎁 Gift Items</h1>
<p>Dollar Variety Mart - Sillanwali</p>
</header>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/400/300?random=1">
<h3>Gift Box</h3>
<p class="price">Rs.280</p>
<a class="btn" href="https://wa.me/923016708194?text=Gift Box Order">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=2">
<h3>Teddy Bear</h3>
<p class="price">Rs.280</p>
<a class="btn" href="https://wa.me/923016708194?text=Teddy Bear Order">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=3">
<h3>Flower Basket</h3>
<p class="price">Rs.280</p>
<a class="btn" href="https://wa.me/923016708194?text=Flower Basket Order">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=4">
<h3>Photo Frame</h3>
<p class="price">Rs.280</p>
<a class="btn" href="https://wa.me/923016708194?text=Photo Frame Order">Order Now</a>
</div>

</div>

<footer>
<p>Dollar Variety Mart - Sillanwali</p>
</footer>

</body>
</html>
